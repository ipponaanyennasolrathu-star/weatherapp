<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Agri Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";
        
        window.firebaseImports = { initializeApp, getAuth, signInAnonymously, getDatabase, ref, onValue };
    </script>

    <script>
        window.__firebase_config = JSON.stringify({
            apiKey: "AIzaSyDpNpqE7y8jz3U_t3hnhIB7wxGYOxkpLKs",
            authDomain: "safeguard-weather.firebaseapp.com",
            databaseURL: "https://safeguard-weather-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "safeguard-weather",
            appId: "1:392754094263:web:16ef772bf1aae3fba36d32"
        });
        window.__app_id = "safeguard-weather";
    </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <div class="max-w-6xl mx-auto p-4 lg:p-8">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 p-6 bg-white rounded-2xl shadow-sm border border-gray-100">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">Agri-Monitor Live</h1>
                <p class="text-gray-500 font-medium">Field Station: VIT Chennai</p>
            </div>
            <div class="mt-4 md:mt-0 flex items-center gap-4">
                <div id="statusIndicator" class="flex items-center gap-2 px-4 py-2 bg-green-100 text-green-700 rounded-full text-sm font-bold">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> SYSTEM ONLINE
                </div>
            </div>
        </header>

        <div class="flex flex-col items-center mb-10">
            <div id="alertCircle" class="w-48 h-48 rounded-full flex flex-col items-center justify-center text-white shadow-2xl transition-all duration-700 bg-green-500">
                <span class="text-xs uppercase tracking-widest font-bold opacity-80">Current Status</span>
                <span id="alertText" class="text-4xl font-black">SAFE</span>
            </div>
            <p class="mt-4 text-sm text-gray-400">Last update: <span id="lastUpdated">--:--:--</span></p>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="card p-6 border-b-4 border-orange-400">
                <p class="text-xs font-bold text-gray-400 uppercase">Temperature</p>
                <div id="currentTemp" class="text-4xl font-black mt-2">--°C</div>
            </div>
            <div class="card p-6 border-b-4 border-blue-400">
                <p class="text-xs font-bold text-gray-400 uppercase">Humidity</p>
                <div id="currentHumidity" class="text-4xl font-black mt-2">--%</div>
            </div>
            <div class="card p-6 border-b-4 border-indigo-500">
                <p class="text-xs font-bold text-gray-400 uppercase">Rain Status</p>
                <div id="currentRain" class="text-4xl font-black mt-2">--%</div>
            </div>
            <div class="card p-6 border-b-4 border-yellow-400">
                <p class="text-xs font-bold text-gray-400 uppercase">Light Level</p>
                <div id="currentLight" class="text-4xl font-black mt-2 text-gray-700">--</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-emerald-50 p-6 rounded-2xl border-l-8 border-emerald-500">
                <h3 class="font-bold text-emerald-800 text-lg mb-2">🌾 Agricultural Advice</h3>
                <p id="agriAction" class="text-emerald-900 leading-relaxed">Waiting for sensor stream...</p>
            </div>
            <div class="bg-amber-50 p-6 rounded-2xl border-l-8 border-amber-500">
                <h3 class="font-bold text-amber-800 text-lg mb-2">🚜 Safety Checklist</h3>
                <ul id="safetySuggestions" class="text-amber-900 space-y-2 text-sm">
                    <li>Awaiting live field data...</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
